services:
  db: #PosgreSQL service
    container_name: postgres
    image: postgres:18-alpine
    restart: always
    shm_size: 256mb

    environment:
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
      POSTGRES_DB: ${DATABASE_NAME}

    volumes:
      - postgres_data:/var/lib/postgresql

    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DATABASE_USER}" ]
      interval: 5s
      timeout: 5s
      retries: 5

  db-test:
    container_name: test-postgres
    image: postgres:18-alpine
    restart: always
    shm_size: 256mb

    environment:
      POSTGRES_PASSWORD: ${TEST_PASSWORD}
      POSTGRES_DB: ${TEST_DATABASE_NAME}

    volumes:
      - test_data:/var/lib/postgresql

    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DATABASE_USER}" ]
      interval: 1s
      timeout: 5s
      retries: 5

  adminer: # Adminer Database Management Web portal
    container_name: db-adminer
    image: adminer
    restart: always
    ports:
      - 8080:8080

  server: # Express backend service
    container_name: server
    build:
      context: ./server
      dockerfile: dockerfile
    
    volumes:
      - ./server:/app
      - /app/node_modules

    ports:
      - "3000:3000"

    environment:
      PORT: 3000
      TEST_DATABASE_URL: postgres://${DATABASE_USER}:${TEST_PASSWORD}@db-test:5432/${TEST_DATABASE_NAME}
      DATABASE_URL: postgres://${DATABASE_USER}:${DATABASE_PASSWORD}@db:5432/${DATABASE_NAME} #user:password@service:port/dbname
      JWT_SECRET: ${JWT_SECRET}

    depends_on:
      db-test:
        condition: service_healthy
      db:
        condition: service_healthy

    command: >
      sh -c "npx knex migrate:latest && npm run dev"
    
  client: # Vite frontend service
    container_name: client
    build:
      context: ./client
      dockerfile: dockerfile

    volumes:
      - ./client:/app
      - /app/node_modules

    ports:
      - "5173:5173"

    depends_on:
      - server

volumes:
  postgres_data:
  test_data:
